<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>教學駕駛艙總覽</title>
    <style>
      :root {
        --board: #183b34;
        --board-2: #102c27;
        --chalk: #f7f2df;
        --muted: #d7cfb8;
        --yellow: #ffd86b;
        --orange: #f4a261;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--chalk);
        font-family: "Microsoft JhengHei", "Noto Sans TC", "Segoe UI", sans-serif;
        background:
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px) 0 0 / 56px 56px,
          var(--board);
      }
      main {
        width: min(1040px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 56px 0;
      }
      header {
        display: flex;
        align-items: center;
        gap: 18px;
        padding-bottom: 28px;
        border-bottom: 1px solid rgba(247, 242, 223, 0.22);
      }
      .mark {
        display: grid;
        place-items: center;
        width: 62px;
        height: 62px;
        background: var(--chalk);
        color: var(--board);
        font-weight: 900;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: var(--muted);
      }
      h1 {
        margin: 0 0 6px;
        font-size: clamp(32px, 5vw, 54px);
        line-height: 1.1;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
        margin-top: 28px;
      }
      .card {
        min-height: 210px;
        padding: 22px;
        color: inherit;
        text-decoration: none;
        border: 1px solid rgba(247, 242, 223, 0.35);
        background: rgba(16, 44, 39, 0.76);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
      }
      .card:hover {
        border-color: var(--yellow);
        background: rgba(255, 216, 107, 0.1);
      }
      .card small {
        color: var(--yellow);
        font-weight: 900;
      }
      .card h2 {
        margin: 12px 0;
        font-size: 30px;
      }
      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }
      .tag {
        padding: 6px 9px;
        color: var(--chalk);
        border: 1px solid rgba(247, 242, 223, 0.26);
      }
      footer {
        margin-top: 26px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="mark">D</div>
        <div>
          <h1>教學駕駛艙總覽</h1>
          <p>統一管理黑板粉筆風格教學駕駛艙。</p>
        </div>
      </header>
      <section class="grid" aria-label="駕駛艙列表">
        <a class="card" href="./unit1/">
          <small>115 上・Unit 1</small>
          <h2>115上英語教學駕駛艙</h2>
          <p>健康習慣、現在完成式、閱讀策略與形成性評量。</p>
          <div class="tag-row">
            <span class="tag">簡報輪播</span>
            <span class="tag">互動評量</span>
            <span class="tag">資訊圖表</span>
          </div>
        </a>
      </section>
      <footer>新增其他單元時，建立新的資料夾並在此頁加入入口卡片。</footer>
    </main>
  </body>
</html>
