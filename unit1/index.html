<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unit 1 教學駕駛艙</title>
    <link rel="stylesheet" href="./style.css?v=20260710b" />
  </head>
  <body>
    <canvas id="drawLayer" class="draw-layer" aria-label="課堂註記畫布"></canvas>

    <header class="topbar">
      <div class="brand">
        <span class="unit-mark">U1</span>
        <div>
          <p class="eyebrow">Have You Had Breakfast Yet?</p>
          <h1>Unit 1 教學駕駛艙</h1>
        </div>
      </div>
      <div class="top-actions">
        <div class="view-tabs" aria-label="顯示模式">
          <button class="tab-btn active" data-view="slides" type="button">簡報</button>
          <button class="tab-btn" data-view="pages" type="button">收錄頁面</button>
          <button class="tab-btn" data-view="graphics" type="button">資訊圖表</button>
        </div>
        <button id="toggleTools" class="tool-toggle" type="button">教師工具</button>
      </div>
    </header>

    <main class="app-shell">
      <nav class="lesson-rail" aria-label="教學焦點">
        <div class="rail-title">
          <span>教學焦點</span>
          <strong id="focusIndex">1 / 7</strong>
        </div>
        <div id="focusList" class="focus-list"></div>
      </nav>

      <section class="stage-area" aria-live="polite">
        <div class="stage-meta">
          <div>
            <p id="focusLabel" class="eyebrow"></p>
            <h2 id="focusTitle"></h2>
          </div>
          <div class="meta-pills">
            <span id="assetLabel">簡報 1 / 12</span>
            <span id="scoreText">答題 0 / 7</span>
          </div>
        </div>

        <section class="stage">
          <button id="prevAsset" class="nav-arrow" type="button" aria-label="上一頁">‹</button>
          <figure class="asset-frame">
            <img id="mainImage" alt="目前教學素材" />
          </figure>
          <button id="nextAsset" class="nav-arrow" type="button" aria-label="下一頁">›</button>
        </section>

        <section class="slide-strip" aria-label="目前模式素材清單">
          <div id="assetStrip" class="asset-strip"></div>
        </section>

        <section class="lesson-board">
          <article class="prompt-panel">
            <p class="panel-kicker">教學提示</p>
            <h3 id="teacherCue"></h3>
            <p id="teacherNote"></p>
          </article>
          <article class="check-panel">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">即時檢核</p>
                <h3 id="questionText"></h3>
              </div>
              <button id="showAnswer" class="small-btn" type="button">顯示答案</button>
            </div>
            <div id="choiceList" class="choice-list"></div>
            <p id="feedbackText" class="feedback"></p>
          </article>
        </section>
      </section>
    </main>

    <aside id="toolPanel" class="tool-panel" aria-label="教師工具">
      <div class="tool-head">
        <strong>教師工具</strong>
        <button id="closeTools" class="icon-btn" type="button" aria-label="收合教師工具">×</button>
      </div>

      <section class="tool-section">
        <h4>點名</h4>
        <textarea id="rosterInput" rows="5">Amy
Ben
Cody
Ela
Harry
Kate
Jim</textarea>
        <div class="tool-row">
          <button id="pickName" class="small-btn" type="button">抽選</button>
          <strong id="pickedName">尚未抽選</strong>
        </div>
      </section>

      <section class="tool-section">
        <h4>倒數計時</h4>
        <div id="timerDisplay" class="timer-display">03:00</div>
        <div class="preset-row">
          <button class="preset-btn" data-seconds="60" type="button">1 分</button>
          <button class="preset-btn active" data-seconds="180" type="button">3 分</button>
          <button class="preset-btn" data-seconds="300" type="button">5 分</button>
        </div>
        <div class="tool-row">
          <button id="startTimer" class="small-btn" type="button">開始</button>
          <button id="pauseTimer" class="small-btn" type="button">暫停</button>
          <button id="resetTimer" class="small-btn" type="button">重設</button>
        </div>
      </section>

      <section class="tool-section">
        <h4>畫筆</h4>
        <div class="swatches" aria-label="畫筆顏色">
          <button class="swatch active" data-color="#fff7d6" style="--swatch: #fff7d6" type="button" aria-label="粉筆白"></button>
          <button class="swatch" data-color="#ffd166" style="--swatch: #ffd166" type="button" aria-label="重點黃"></button>
          <button class="swatch" data-color="#ef476f" style="--swatch: #ef476f" type="button" aria-label="提醒紅"></button>
          <button class="swatch" data-color="#5dd6c6" style="--swatch: #5dd6c6" type="button" aria-label="標記青"></button>
        </div>
        <label class="range-label">粗細 <input id="penSize" type="range" min="2" max="16" value="5" /></label>
        <div class="tool-row">
          <button id="togglePen" class="small-btn" type="button">啟用畫筆</button>
          <button id="clearPen" class="small-btn" type="button">清除</button>
        </div>
      </section>
    </aside>

    <script src="./app.js?v=20260710b"></script>
  </body>
</html>
